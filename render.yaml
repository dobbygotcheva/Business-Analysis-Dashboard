services:
  - type: web
    name: business-analytics-dashboard
    env: node
    buildCommand: |
      ./gradlew build
      yarn install
    startCommand: |
      java -jar build/libs/demo-0.0.1-SNAPSHOT.jar &
      yarn start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 8081
      - key: JAVA_VERSION
        value: 11 