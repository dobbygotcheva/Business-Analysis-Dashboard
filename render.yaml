services:
  - type: web
    name: business-analytics-dashboard
    env: node
    buildCommand: |
      ./gradlew build
      yarn install
      chmod +x start.sh
    startCommand: ./start.sh
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 8081
      - key: JAVA_VERSION
        value: 11
      - key: SERVER_PORT
        value: 8080 